<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZQuiz Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #6c5ce7;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .room-card {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: row;
            min-height: 500px;
        }
        .left-panel {
            background: #f8f9fa;
            width: 350px;
            padding: 30px;
            border-right: 1px solid #dfe6e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .right-panel {
            flex: 1;
            padding: 30px;
            background: white;
            display: flex;
            flex-direction: column;
        }
        .join-code-box {
            border: 2px dashed #6c5ce7;
            border-radius: 15px;
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
            background: #f3f0ff;
        }
        .join-code {
            font-size: 48px;
            font-weight: 800;
            color: #4834d4;
            letter-spacing: 2px;
        }
        .btn-start {
            background: #10ac84; 
            color: white;
            font-weight: 700;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            transition: all 0.3s;
        }
        .btn-start:hover {
            background: #0dd3a2;
            transform: translateY(-2px);
        }
        .download-btn {
            width: 48%;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
        }
        .download-btn:hover { color: white; opacity: 0.9; }
        
        .logo-small {
            background: linear-gradient(45deg, #ff9f43, #ee5253);
            width: 30px; height: 30px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; margin-right: 10px;
        }
        
        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            align-content: flex-start;
            flex: 1;
        }
        .player-chip {
            background: #ffeaa7;
            color: #d35400;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #fdcb6e;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 12px 20px;
            margin-bottom: 10px;
            border-radius: 12px;
            border-left: 5px solid #a29bfe;
            width: 100%;
            font-weight: 600;
            animation: popIn 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .leaderboard-item.top-1 { border-left-color: #ffd700; background: #fffdf0; }
        .leaderboard-item.top-2 { border-left-color: #c0c0c0; background: #f8f9fa; }
        .leaderboard-item.top-3 { border-left-color: #cd7f32; background: #fff5ee; }
        .leaderboard-item .score-badge {
            background: #6c5ce7;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        /* Эффект при наведении на QR */
        .qr-image {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .qr-image:hover {
            transform: scale(1.05);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="room-card">
    <div class="left-panel">
        <div class="d-flex align-items-center mb-4">
            <div class="logo-small">Z</div>
            <h4 class="fw-bold m-0" style="color: #6c5ce7;">ZQuiz Room</h4>
        </div>

        <p class="text-muted small fw-bold">ҚОСЫЛУ КОДЫ</p>
        <div class="join-code-box">
            <div class="join-code">{{ otp }}</div>
        </div>

        <p class="text-muted small"><i class="fas fa-search-plus"></i> Үлкейту үшін басыңыз</p>
        
        <img src="data:image/png;base64,{{ join_url | qrcode }}" class="img-fluid mb-3 border rounded qr-image" style="width: 180px;" data-bs-toggle="modal" data-bs-target="#qrModal">
        
        <div class="input-group input-group-sm mb-4">
            <input type="text" class="form-control" value="{{ join_url }}" id="joinUrlInput" readonly>
            <button class="btn btn-outline-secondary" onclick="copyLink()"><i class="fas fa-copy"></i></button>
        </div>

        <button class="btn-start mb-3" onclick="startQuiz()"><i class="fas fa-play me-2"></i> БАСТАУ</button>

        <div class="d-flex justify-content-between w-100">
            <a href="/download/{{ otp }}/docx" class="btn btn-primary download-btn"><i class="fas fa-file-word me-2"></i> Word</a>
            <a href="/download/{{ otp }}/pdf" class="btn btn-danger download-btn"><i class="fas fa-file-pdf me-2"></i> PDF</a>
        </div>
    </div>

    <div class="right-panel">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="fw-bold"><i class="fas fa-trophy text-warning me-2"></i> Рейтинг (<span id="playerCount">0</span>)</h5>
            <a href="/" class="btn btn-sm btn-outline-danger">Шығу</a>
        </div>
        <hr>
        
        <div id="playersContainer" class="d-flex flex-column align-items-center justify-content-center h-75 text-muted">
            <i class="fas fa-ghost fa-3x mb-3" style="color: #dfe6e9;"></i>
            <p>Оқушылар қосылғанда тізім осында шығады...</p>
        </div>
        
        <div id="realPlayerList" class="player-list" style="display: none;"></div>
    </div>
</div>

<div class="modal fade" id="qrModal" tabindex="-1" aria-labelledby="qrModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 20px;">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center pb-5">
        <h2 class="fw-bold mb-4" style="color: #6c5ce7;">Қосылу коды: {{ otp }}</h2>
        <img src="data:image/png;base64,{{ join_url | qrcode }}" class="img-fluid border rounded shadow-sm" style="width: 80%; max-width: 400px;">
        <p class="text-muted mt-4">Камераңызды немесе QR-сканерді бағыттаңыз</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const otp = "{{ otp }}";

    function copyLink() {
        var copyText = document.getElementById("joinUrlInput");
        copyText.select();
        document.execCommand("copy");
        alert("Сілтеме көшірілді: " + copyText.value);
    }

    function startQuiz() {
        fetch('/start_quiz/' + otp)
        .then(response => response.json())
        .then(data => {
            if(data.status === 'started') {
                alert("Тест басталды! Оқушылардың экраны енді өзгереді.");
            }
        })
        .catch(err => alert("Қате: " + err));
    }

    setInterval(fetchPlayers, 2000);

    function fetchPlayers() {
        fetch('/get_players/' + otp)
        .then(response => {
            if(response.ok) return response.json();
            throw new Error('Network response');
        })
        .then(data => {
            updateUI(data.players);
        })
        .catch(err => console.log("Күтілуде...")); 
    }

    function updateUI(players) {
        const container = document.getElementById('playersContainer');
        const list = document.getElementById('realPlayerList');
        const countSpan = document.getElementById('playerCount');

        countSpan.innerText = players.length;

        if (players.length > 0) {
            container.style.display = 'none';
            list.innerHTML = '';
            
            let isLeaderboard = players[0] !== null && typeof players[0] === 'object';

            if (isLeaderboard) {
                list.style.display = 'block';
                list.style.width = '100%';
                
                players.sort((a, b) => b.score - a.score);
                
                players.forEach((p, index) => {
                    const item = document.createElement('div');
                    item.className = 'leaderboard-item';
                    
                    let medal = `${index + 1}.`;
                    if (index === 0) { medal = '🥇'; item.classList.add('top-1'); }
                    else if (index === 1) { medal = '🥈'; item.classList.add('top-2'); }
                    else if (index === 2) { medal = '🥉'; item.classList.add('top-3'); }

                    item.innerHTML = `
                        <div>
                            <span style="width: 30px; display: inline-block; font-weight: bold;">${medal}</span> 
                            ${p.name}
                        </div>
                        <div class="score-badge">${p.score} ұпай</div>
                    `;
                    list.appendChild(item);
                });
            } else {
                list.style.display = 'flex';
                players.forEach(p => {
                    const chip = document.createElement('div');
                    chip.className = 'player-chip';
                    chip.innerHTML = '<i class="fas fa-user-graduate me-2"></i>' + p;
                    list.appendChild(chip);
                });
            }
        } else {
            container.style.display = 'flex';
            list.style.display = 'none';
        }
    }
</script>

</body>
</html>
