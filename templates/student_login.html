<!DOCTYPE html>
<html lang="kz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кіру / Вход - ZQuiz</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            border: none;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.95); /* Сәл мөлдір */
        }
        .form-control-lg { 
            border-radius: 12px; 
            font-size: 18px; 
            padding: 12px; 
            border: 2px solid #e1e1e1;
        }
        .form-control-lg:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 0.25rem rgba(118, 75, 162, 0.25);
        }
        .btn-lg { 
            border-radius: 12px; 
            padding: 12px; 
            font-size: 20px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            transition: transform 0.2s;
        }
        .btn-lg:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .game-code-input {
            letter-spacing: 5px; 
            font-weight: 800; 
            color: #764ba2;
            background-color: #f3f0ff;
            border: 2px dashed #764ba2;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card login-card mx-auto">
            <div class="card-body text-center">
                
                <div class="mb-4">
                    <div style="width: 60px; height: 60px; background: #764ba2; color: white; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);">
                        Z
                    </div>
                </div>
                
                <h4 class="fw-bold mb-1">Ойынға қосылу</h4>
                <p class="text-muted small mb-4">Вход в викторину</p>

                {% if error %}
                <div class="alert alert-danger p-2 mb-3 small fw-bold">
                    ⚠️ {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    
                    <div class="mb-3 text-start">
                        <label class="form-label text-muted small fw-bold text-uppercase">Сіздің атыңыз / Имя</label>
                        <input type="text" name="nickname" class="form-control form-control-lg fw-bold" placeholder="Мысалы: Алихан" required autocomplete="off" autofocus>
                    </div>

                    <div class="mb-4 text-start">
                        <label class="form-label text-muted small fw-bold text-uppercase">Ойын коды / Код</label>
                        <input type="tel" name="otp" class="form-control form-control-lg text-center game-code-input" value="{{ otp }}" readonly>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 text-white">
                        ҚОСЫЛУ <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </form>

                {% if topic %}
                <div class="mt-3 pt-3 border-top">
                    <span class="badge bg-light text-dark border">Тақырып: {{ topic }}</span>
                </div>
                {% endif %}
            </div>
        </div>
        
        <p class="text-white text-center mt-3 small opacity-75 fw-bold">
            ZQuiz AI Platform © 2026
        </p>
    </div>

</body>
</html>
